name: omnistream
type: public
description: "Flink核心向量化算子库。采用Native Code（C/C++）实现Flink SQL和DataStream算子。针对Flink
  SQL，OmniStream采用C++结合向量化指令实现算子，以列式内存数据格式OmniVec进行内存计算，充分利用向量化加速，提升SQL计算性能。针对Flink
  DataStream，OmniStream采用C++结合向量化指令实现算子，结合自动Native化工具将UDF翻译成C++程序，充分发挥Native
  Code性能优势，提升DataStream场景性能。"
branches:
  - name: master
    type: protected
